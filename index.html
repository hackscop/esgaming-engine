<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ESGaming Architect Engine</title>
    <style>
        body { background-color: #0f172a; color: #f8fafc; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; }
        
        #ai-full-page { 
            display: none; 
            opacity: 0; 
            transition: opacity 0.3s; 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            background: #0f172a; 
            flex-direction: column; 
            padding: 20px; 
            box-sizing: border-box; 
            z-index: 1000;
        }

        #scroll-box { flex-grow: 1; overflow-y: auto; margin-bottom: 20px; padding-right: 10px; }
        
        .chat-row { margin-bottom: 20px; }
        .chat-label { font-size: 0.75rem; color: #94a3b8; display: block; margin-bottom: 5px; text-transform: uppercase; }
        
        .bubble { 
            background: #1e293b; 
            padding: 12px 16px; 
            border-radius: 12px; 
            display: inline-block; 
            max-width: 85%; 
            line-height: 1.5;
            border: 1px solid #334155;
        }

        .user .bubble { background: #4f46e5; color: white; }
        
        #input-area { display: flex; gap: 10px; padding-top: 10px; border-top: 1px solid #334155; }
        
        input { 
            flex-grow: 1; 
            padding: 12px; 
            border-radius: 8px; 
            border: 1px solid #334155; 
            background: #0f172a; 
            color: white; 
        }

        button { 
            padding: 12px 20px; 
            border-radius: 8px; 
            border: none; 
            background: #6366f1; 
            color: white; 
            cursor: pointer; 
            font-weight: bold;
        }

        .highlight-active { outline: 2px solid #6366f1; }
    </style>
</head>
<body>

    <button onclick="openAIPanel()" style="margin: 20px;">Launch Architect Engine</button>

    <div id="ai-full-page">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 20px;">
            <h3 style="margin:0;">ESGaming Architect Engine</h3>
            <button onclick="closeAIPanel()" style="background: #334155;">Close</button>
        </div>
        
        <div id="scroll-box">
            <div id="chat-board">
                <div class="chat-row ai">
                    <span class="chat-label">Architect Agent</span>
                    <div class="bubble">Welcome. Provide your target performance metrics or custom budget, and I will assemble an accurate build mapping from our direct verified catalog data.</div>
                </div>
            </div>
        </div>
        
        <div id="input-area">
            <input type="text" id="userIn" placeholder="Ask anything or request a PC build...">
            <button onclick="executeAISignaling()">Send</button>
        </div>
    </div>

    <script>
        function openAIPanel() {
            const panel = document.getElementById('ai-full-page');
            panel.style.display = 'flex';
            setTimeout(() => { panel.style.opacity = '1'; }, 10);
        }

        function closeAIPanel() {
            const panel = document.getElementById('ai-full-page');
            panel.style.opacity = '0';
            setTimeout(() => { panel.style.display = 'none'; }, 300);
        }

        async function executeAISignaling() {
            const board = document.getElementById('chat-board');
            const inputEl = document.getElementById('userIn');
            const query = inputEl.value;

            if (!query.trim()) return;

            board.innerHTML += `
                <div class="chat-row user">
                    <span class="chat-label">You</span>
                    <div class="bubble">${query}</div>
                </div>`;
            
            inputEl.value = '';
            scrollChat();

            const placeholderId = "gen-" + Date.now();
            board.innerHTML += `
                <div class="chat-row ai" id="${placeholderId}">
                    <span class="chat-label">Architect Agent</span>
                    <div class="bubble"><i>Analyzing data paths...</i></div>
                </div>`;
            scrollChat();

            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ prompt: query })
                });
                
                const data = await response.json();

                if (!response.ok) throw new Error(data.error || "Failed to fetch");

                document.getElementById(placeholderId).remove();

                const formattedTxt = data.response.replace(/\n/g, '<br>');
                board.innerHTML += `
                    <div class="chat-row ai">
                        <span class="chat-label">Architect Agent</span>
                        <div class="bubble">${formattedTxt}</div>
                    </div>`;
                
                scrollChat();

            } catch (err) {
                if(document.getElementById(placeholderId)) document.getElementById(placeholderId).remove();
                board.innerHTML += `
                    <div class="chat-row ai">
                        <span class="chat-label">System Error</span>
                        <div class="bubble" style="color: #f43f5e;">Execution string terminated. Check server logs.</div>
                    </div>`;
                scrollChat();
                console.error("Frontend Error:", err);
            }
        }

        function scrollChat() {
            const container = document.getElementById('scroll-box');
            container.scrollTop = container.scrollHeight;
        }

        document.getElementById("userIn").addEventListener("keypress", function(e) {
            if (e.key === "Enter") { e.preventDefault(); executeAISignaling(); }
        });
    </script>
</body>
</html>
