<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KMDTech | Premium Phones & Consoles</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background-color: #0f1115;
            color: #ffffff;
            font-family: 'Segoe UI', sans-serif;
            padding: 20px;
        }
        header {
            text-align: center;
            padding: 30px 0;
            border-bottom: 1px solid #222;
        }
        header h1 { color: #8A2BE2; font-size: 28px; }
        header p { color: #aaa; margin-top: 5px; }
        
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            max-width: 1000px;
            margin: 40px auto;
        }
        .product-card {
            background: #161a22;
            border: 1px solid #252b36;
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
        }
        .product-image {
            font-size: 50px;
            margin-bottom: 15px;
        }
        .product-card h3 { font-size: 18px; margin-bottom: 10px; }
        .price { color: #8A2BE2; font-weight: bold; font-size: 20px; margin-bottom: 15px; }
        .buy-btn {
            background: #8A2BE2;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            width: 100%;
        }
    </style>
</head>
<body>

    <header>
        <h1>KMDTech Nairobi</h1>
        <p>Latest iPhones, Samsungs, and Gaming Consoles with Warranty</p>
    </header>

    <main class="products-grid">
        <!-- Product 1 -->
        <div class="product-card">
            <div class="product-image">📱</div>
            <h3>iPhone 15 Pro Max (256GB)</h3>
            <div class="price">190,000 KES</div>
            <button class="buy-btn">Buy Now</button>
        </div>

        <!-- Product 2 -->
        <div class="product-card">
            <div class="product-image">🎮</div>
            <h3>PlayStation 5 Disc Edition</h3>
            <div class="price">85,000 KES</div>
            <button class="buy-btn">Buy Now</button>
        </div>

        <!-- Product 3 -->
        <div class="product-card">
            <div class="product-image">📱</div>
            <h3>Samsung Galaxy S24 Ultra</h3>
            <div class="price">165,000 KES</div>

        </div>
    </main>

</html>
